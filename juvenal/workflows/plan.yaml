name: plan
backend: claude
max_bounces: 999

vars:
  GOAL: ""

phases:
  - id: plan-draft
    prompt_file: plan-phases/01-plan-draft.md

  - id: plan-smokecheck
    type: check
    bounce_target: plan-draft
    prompt_file: plan-phases/02-plan-smokecheck.md

  - id: plan-refine
    interactive: true
    prompt_file: plan-phases/03-plan-refine.md

  - id: plan-review
    type: check
    bounce_target: plan-refine
    prompt_file: plan-phases/04-plan-review.md

  - id: plan-cleanup
    prompt_file: plan-phases/05-plan-cleanup.md

  - id: plan-cleanup-review
    type: check
    bounce_target: plan-cleanup
    prompt_file: plan-phases/06-plan-cleanup-review.md

  - id: plan-split
    prompt_file: plan-phases/07-plan-split.md

  - id: plan-split-review
    type: check
    bounce_target: plan-split
    prompt_file: plan-phases/08-plan-split-review.md

  - id: write-workflow
    prompt_file: plan-phases/09-write-workflow.md

  - id: yaml-validate
    type: check
    bounce_target: write-workflow
    prompt_file: plan-phases/09b-yaml-validate.md

  - id: workflow-review
    type: check
    bounce_target: write-workflow
    prompt_file: plan-phases/10-workflow-review.md
