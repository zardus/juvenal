name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check juvenal/ tests/
      - run: ruff format --check juvenal/ tests/

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -x --ignore=tests/test_e2e_claude.py --ignore=tests/test_e2e_codex.py --ignore=tests/test_skill.py

  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-anthropic: ${{ steps.check.outputs.has-anthropic }}
      has-openai: ${{ steps.check.outputs.has-openai }}
    steps:
      - id: check
        run: |
          echo "has-anthropic=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
          echo "has-openai=${{ secrets.OPENAI_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

  e2e-claude:
    runs-on: ubuntu-latest
    if: needs.check-secrets.outputs.has-anthropic == 'true'
    needs: [lint, unit, check-secrets]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: npm install -g @anthropic-ai/claude-code
      - run: pytest tests/test_e2e_claude.py -x -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  e2e-codex:
    runs-on: ubuntu-latest
    if: needs.check-secrets.outputs.has-openai == 'true'
    needs: [lint, unit, check-secrets]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install -e ".[dev]"
      - name: Login to codex
        run: echo "$OPENAI_API_KEY" | npx @openai/codex@latest login --with-api-key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - run: pytest tests/test_e2e_codex.py -x -v
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  e2e-skill:
    runs-on: ubuntu-latest
    if: needs.check-secrets.outputs.has-anthropic == 'true'
    needs: [lint, unit, check-secrets]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: npm install -g @anthropic-ai/claude-code
      - run: pytest tests/test_skill.py -x -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
